services:

  # ── PostgreSQL database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d urlshortener"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis cache ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Shortener Service (internal, port 8001) ──────────────────────────────────
  # Owns the database and Redis cache.
  # NOT exposed to the host — only reachable inside the Docker network.
  shortener:
    build:
      context: .
      dockerfile: services/shortener/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/urlshortener
      REDIS_URL: redis://redis:6379
    volumes:
      # Mount source so --reload picks up changes without rebuilding the image
      - ./services/shortener:/app/shortener
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── API Gateway (public-facing, port 8000) ────────────────────────────────────
  # Receives all requests from the browser.
  # Forwards to internal services via httpx (no business logic here).
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    restart: unless-stopped
    environment:
      SHORTENER_URL: http://shortener:8001
    ports:
      # Only the gateway is exposed to the host — all other services are internal.
      - "8000:8000"
    volumes:
      - ./services/gateway:/app/gateway
    depends_on:
      - shortener

# ── Named volume for DB persistence ─────────────────────────────────────────
volumes:
  postgres_data:
