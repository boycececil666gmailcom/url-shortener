apiVersion: v1
kind: Namespace
metadata:
  name: url-shortener
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: url-shortener
data:
  # Internal Kubernetes DNS names for the services
  # When using the Zalando operator, the DB service is usually named <cluster-name>
  # When using the Redis operator, the Redis service is named <cluster-name>
  SHORTENER_DB_URL: "postgresql://postgres:postgres@shortener-db:5432/urlshortener"
  SHORTENER_REDIS_URL: "redis://rfrm-shortener-redis:6379"
  AUTH_DB_URL: "postgresql://postgres:postgres@auth-db:5432/auth"
  AUTH_REDIS_URL: "redis://rfrm-auth-redis:6379"
  SHORTENER_URL: "http://shortener:8001"
  AUTH_URL: "http://auth:8002"
  CACHE_TTL_SECONDS: "86400"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRATION_MINUTES: "15"
  REFRESH_TOKEN_TTL_SECONDS: "2592000"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: url-shortener
type: Opaque
stringData:
  # In a real production environment, these should be managed by a secrets manager
  # (like AWS Secrets Manager, HashiCorp Vault, or SealedSecrets)
  JWT_SECRET: "k8s-dev-secret-change-me"
