apiVersion: databases.spotahome.com/v1
kind: RedisFailover
metadata:
  name: shortener-redis
  namespace: url-shortener
spec:
  sentinel:
    replicas: 3
  redis:
    replicas: 3
    exporter:
      enabled: false
---
apiVersion: v1
kind: Service
metadata:
  name: rfrm-shortener-redis
  namespace: url-shortener
spec:
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
  selector:
    redisfailovers-role: master
    redisfailovers.databases.spotahome.com/name: shortener-redis

