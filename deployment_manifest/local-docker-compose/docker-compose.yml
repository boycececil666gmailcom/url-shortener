services:

  # ═══════════════════════════════════════════════════════════════════════════════
  # Shortener Service infrastructure
  # ═══════════════════════════════════════════════════════════════════════════════

  # ── PostgreSQL database (Shortener) ─────────────────────────────────────────
  shortener-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d urlshortener" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis cache (Shortener) ─────────────────────────────────────────────────
  shortener-redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Shortener Service (internal, port 8001) ──────────────────────────────────
  # Owns the database and Redis cache.
  # NOT exposed to the host — only reachable inside the Docker network.
  shortener:
    build:
      context: ../../
      dockerfile: services/shortener/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@shortener-db:5432/urlshortener
      REDIS_URL: redis://shortener-redis:6379
      CACHE_TTL_SECONDS: 86400
      KAFKA_BROKER_URL: ${KAFKA_BROKER_URL:-kafka:9092}
    volumes:
      # Mount source so --reload picks up changes without rebuilding the image
      - ../../services/shortener:/app/shortener
    depends_on:
      shortener-db:
        condition: service_healthy
      shortener-redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ═══════════════════════════════════════════════════════════════════════════════
  # Auth Service infrastructure
  # ═══════════════════════════════════════════════════════════════════════════════

  # ── PostgreSQL database (Auth) ──────────────────────────────────────────────
  auth-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d auth" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis token store (Auth) ────────────────────────────────────────────────
  auth-redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Auth Service (internal, port 8002) ──────────────────────────────────────
  # Handles user registration, login, token refresh, and logout.
  # NOT exposed to the host — only reachable inside the Docker network.
  auth:
    build:
      context: ../../
      dockerfile: services/auth/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@auth-db:5432/auth
      REDIS_URL: redis://auth-redis:6379
      JWT_SECRET: dev-secret-change-me
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_MINUTES: 15
      REFRESH_TOKEN_TTL_SECONDS: 2592000
    volumes:
      - ../../services/auth:/app/auth
    depends_on:
      auth-db:
        condition: service_healthy
      auth-redis:
        condition: service_healthy

  # ═══════════════════════════════════════════════════════════════════════════════
  # Kafka Infrastructure
  # ═══════════════════════════════════════════════════════════════════════════════
  kafka:
    image: apache/kafka:3.7.0
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${KAFKA_BROKER_URL:-kafka:9092}
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list" ]
      interval: 10s
      timeout: 10s
      retries: 5

  # ═══════════════════════════════════════════════════════════════════════════════
  # Analytics Infrastructure
  # ═══════════════════════════════════════════════════════════════════════════════
  analytics:
    build:
      context: ../../
      dockerfile: services/analytics/Dockerfile
    restart: unless-stopped
    environment:
      KAFKA_BROKER_URL: ${KAFKA_BROKER_URL:-kafka:9092}
    volumes:
      - ../../services/analytics:/app/analytics
    depends_on:
      kafka:
        condition: service_healthy

  # ═══════════════════════════════════════════════════════════════════════════════
  # API Gateway
  # ═══════════════════════════════════════════════════════════════════════════════

  # ── API Gateway (public-facing, port 8000) ────────────────────────────────────
  # Receives all requests from the browser.
  # Forwards to internal services via httpx (no business logic here).
  gateway:
    build:
      context: ../../
      dockerfile: services/gateway/Dockerfile
    restart: unless-stopped
    environment:
      SHORTENER_URL: http://shortener:8001
      AUTH_URL: http://auth:8002
      ANALYTICS_URL: http://analytics:8003
    ports:
      # Only the gateway is exposed to the host — all other services are internal.
      - "8000:8000"
    volumes:
      - ../../services/gateway:/app/gateway
    depends_on:
      - shortener
      - auth
      - analytics

# ── Named volumes for DB persistence ────────────────────────────────────────
volumes:
  postgres_data:
  auth_postgres_data:

